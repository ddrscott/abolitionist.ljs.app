  <text class="t-sub" x="360" y="213" text-anchor="middle">Typical Arguments Abortion Abolitionists Constantly Hear.</text>
  <polyline points="650.0,208.0 635.0,208.0 630.0,205.0 625.0,214.0 617.5,194.0 610.0,218.0 605.0,204.0 600.0,208.0 580.0,208.0" fill="none"/>

  <!-- table -->
  <g class="grid" fill="none" stroke="#111"><line x1="42" y1="346" x2="42" y2="959"/><line x1="169.2" y1="346" x2="169.2" y2="959"/><line x1="296.4" y1="346" x2="296.4" y2="959"/><line x1="423.6" y1="346" x2="423.6" y2="959"/><line x1="550.8" y1="346" x2="550.8" y2="959"/><line x1="678" y1="346" x2="678" y2="959"/><line x1="42" y1="346" x2="678" y2="346"/><line x1="42" y1="468.6" x2="678" y2="468.6"/><line x1="42" y1="591.2" x2="678" y2="591.2"/><line x1="42" y1="713.8" x2="678" y2="713.8"/><line x1="42" y1="836.4" x2="678" y2="836.4"/><line x1="42" y1="959" x2="678" y2="959"/><rect x="42" y="246" width="636" height="713" fill="none"/><line x1="169.2" y1="246" x2="169.2" y2="346"/><line x1="296.4" y1="246" x2="296.4" y2="346"/><line x1="423.6" y1="246" x2="423.6" y2="346"/><line x1="550.8" y1="246" x2="550.8" y2="346"/></g>
  <text class="t-bingo" x="105.6" y="322" text-anchor="middle">B</text><text class="t-bingo" x="232.8" y="322" text-anchor="middle">I</text><text class="t-bingo" x="360" y="322" text-anchor="middle">N</text><text class="t-bingo" x="487.2" y="322" text-anchor="middle">G</text><text class="t-bingo" x="614.4" y="322" text-anchor="middle">O</text>
  <g>
    <text class="t-cell" text-anchor="middle"><tspan x="105.6" y="395.3">Don't impose</tspan><tspan x="105.6" y="413.3">your</tspan><tspan x="105.6" y="431.3">religion.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="232.8" y="395.3">You're</tspan><tspan x="232.8" y="413.3">forcing</tspan><tspan x="232.8" y="431.3">birth.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="360" y="386.3">They'll just</tspan><tspan x="360" y="404.3">do it</tspan><tspan x="360" y="422.3">illegally</tspan><tspan x="360" y="440.3">anyway.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="487.2" y="395.3">You're</tspan><tspan x="487.2" y="413.3">punishing</tspan><tspan x="487.2" y="431.3">women.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="614.4" y="395.3">Separation of</tspan><tspan x="614.4" y="413.3">church and</tspan><tspan x="614.4" y="431.3">state.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="105.6" y="526.9">You're just</tspan><tspan x="105.6" y="544.9">pro-birth.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="232.8" y="508.9">What about</tspan><tspan x="232.8" y="526.9">the mother's</tspan><tspan x="232.8" y="544.9">life or</tspan><tspan x="232.8" y="562.9">health?</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="360" y="526.9">People can't</tspan><tspan x="360" y="544.9">afford kids.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="487.2" y="526.9">The fetus is</tspan><tspan x="487.2" y="544.9">a parasite.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="614.4" y="508.9">Consent to</tspan><tspan x="614.4" y="526.9">sex isn't</tspan><tspan x="614.4" y="544.9">consent to</tspan><tspan x="614.4" y="562.9">pregnancy.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="105.6" y="649.5">It's not a</tspan><tspan x="105.6" y="667.5">person yet.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="232.8" y="649.5">They're not</tspan><tspan x="232.8" y="667.5">viable.</tspan></text>
    <g class="ink-stroke" stroke-width="1"><line x1="404.0" y1="646.5" x2="412.0" y2="646.5"/><line x1="400.7" y1="663.3" x2="408.0" y2="666.4"/><line x1="391.1" y1="677.6" x2="396.8" y2="683.3"/><line x1="376.8" y1="687.2" x2="379.9" y2="694.5"/><line x1="360.0" y1="690.5" x2="360.0" y2="698.5"/><line x1="343.2" y1="687.2" x2="340.1" y2="694.5"/><line x1="328.9" y1="677.6" x2="323.2" y2="683.3"/><line x1="319.3" y1="663.3" x2="312.0" y2="666.4"/><line x1="316.0" y1="646.5" x2="308.0" y2="646.5"/><line x1="319.3" y1="629.7" x2="312.0" y2="626.6"/><line x1="328.9" y1="615.4" x2="323.2" y2="609.7"/><line x1="343.2" y1="605.8" x2="340.1" y2="598.5"/><line x1="360.0" y1="602.5" x2="360.0" y2="594.5"/><line x1="376.8" y1="605.8" x2="379.9" y2="598.5"/><line x1="391.1" y1="615.4" x2="396.8" y2="609.7"/><line x1="400.7" y1="629.7" x2="408.0" y2="626.6"/></g>
    <text class="t-free" x="360" y="643.5" text-anchor="middle">FREE</text>
    <text class="t-free" x="360" y="666.5" text-anchor="middle">SPACE</text>
    <text class="t-trust" x="360" y="688.5" text-anchor="middle">Trust women.</text>
    <text class="t-cell" text-anchor="middle"><tspan x="487.2" y="649.5">Abortion is</tspan><tspan x="487.2" y="667.5">healthcare.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="614.4" y="640.5">You can't</tspan><tspan x="614.4" y="658.5">legislate</tspan><tspan x="614.4" y="676.5">morality.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="105.6" y="772.1">It's a matter</tspan><tspan x="105.6" y="790.1">of privacy.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="232.8" y="772.1">You only care</tspan><tspan x="232.8" y="790.1">until birth.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="360" y="763.1">The baby</tspan><tspan x="360" y="781.1">would have a</tspan><tspan x="360" y="799.1">bad life.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="487.2" y="763.1">Adoption</tspan><tspan x="487.2" y="781.1">isn't an</tspan><tspan x="487.2" y="799.1">alternative.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="614.4" y="763.1">Banning</tspan><tspan x="614.4" y="781.1">abortion</tspan><tspan x="614.4" y="799.1">kills women.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="105.6" y="885.7">It's between</tspan><tspan x="105.6" y="903.7">a woman and</tspan><tspan x="105.6" y="921.7">her doctor.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="232.8" y="885.7">The unborn</tspan><tspan x="232.8" y="903.7">aren't</tspan><tspan x="232.8" y="921.7">conscious.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="360" y="876.7">Everyone has</tspan><tspan x="360" y="894.7">a right to</tspan><tspan x="360" y="912.7">sex without</tspan><tspan x="360" y="930.7">consequences.</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="487.2" y="894.7">What about</tspan><tspan x="487.2" y="912.7">rape?</tspan></text>
    <text class="t-cell" text-anchor="middle"><tspan x="614.4" y="885.7">It's just a</tspan><tspan x="614.4" y="903.7">clump of</tspan><tspan x="614.4" y="921.7">cells.</tspan></text>
  </g>

